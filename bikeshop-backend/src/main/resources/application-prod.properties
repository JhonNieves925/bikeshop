# =============================================
#  BIKESHOP - Perfil PRODUCCION
#  Todos los valores sensibles vienen de variables de entorno del servidor.
# =============================================

# JPA: en produccion NO modificar el esquema automaticamente
DDL_AUTO=validate

# Cookies seguras (requiere HTTPS)
COOKIE_SECURE=true
COOKIE_SAMESITE=Strict

# SQL apagado en produccion
spring.jpa.show-sql=false

# Logging reducido
logging.level.root=WARN
logging.level.com.bikeshop=INFO

