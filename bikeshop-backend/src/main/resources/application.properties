# =============================================
#  BIKESHOP - Configuración principal
#  ⚠ NUNCA guardes secretos aquí directamente.
#    Usa variables de entorno o application-local.properties (en .gitignore)
# =============================================

spring.application.name=bikeshop-backend

# Perfil activo: "local" carga application-local.properties con los secretos de desarrollo
# En producción cambia esto a "prod" y usa variables de entorno del servidor
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# --- Base de datos MySQL ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bikeshop?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:bikeshop_app}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HikariCP (pool de conexiones) ---
spring.datasource.hikari.pool-name=BikeShopPool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=60000

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- JWT ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# --- CORS ---
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://192.168.0.11:5173,http://192.168.120.1:5173,http://localhost:5174,http://localhost:3000,https://*.ngrok-free.app}

# --- Subida de imágenes ---
app.upload.dir=${UPLOAD_DIR:uploads/images}
app.upload.max-size-mb=5
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# --- Email (SMTP) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Twilio (WhatsApp) ---
twilio.account-sid=${TWILIO_ACCOUNT_SID:DESHABILITADO}
twilio.auth-token=${TWILIO_AUTH_TOKEN:DESHABILITADO}
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

# --- Notificaciones ---
app.notificaciones.email-remitente=${MAIL_REMITENTE:BikeShop <noreply@bikeshop.co>}
app.notificaciones.whatsapp-habilitado=false

# --- Server ---
server.port=${PORT:8080}

# --- URL base de la app (para enlaces en emails, ej: reset de contraseña) ---
# En producción: APP_BASE_URL=https://tu-dominio.com
app.base-url=${APP_BASE_URL:http://localhost:5173}

# --- Cookie de sesión (Frontend H1) ---
# En producción: COOKIE_SECURE=true, COOKIE_SAMESITE=Strict
# En desarrollo con Vite proxy: false/Lax es suficiente (requests son same-origin)
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.samesite=${COOKIE_SAMESITE:Lax}

# --- Silenciar el usuario autogenerado de Spring Security ---
spring.security.user.name=ignored
spring.security.user.password=ignored
logging.level.org.springframework.boot.autoconfigure.security=WARN
